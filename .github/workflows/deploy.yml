name: Build and Deploy FinSurf

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggers from the GitHub Actions UI

env:
  IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/finsurf-trial-run-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets → Actions):
#
#   DOCKER_HUB_USERNAME   — Your Docker Hub username
#   DOCKER_HUB_PASSWORD   — Docker Hub access token (not your password)
#   APP_SECRET            — Bearer token for API auth (contents of secrets/app_secret.txt)
#   GEMINI_API_KEY        — Google Gemini API key
#   PERPLEXITY_API_KEY    — Perplexity API key (leave blank to use Gemini-only)
#   GROQ_API_KEY          — Groq API key (free tier at console.groq.com; leave blank to use Gemini-only)
#   DEPLOYMENT_HOST           — Production server IP or hostname (e.g. 123.45.67.89)
#   DEPLOYMENT_USER           — SSH user on the server (e.g. root)
#   DEPLOYMENT_SSH_KEY        — Private SSH key for that user (PEM format, full contents)
#   DEPLOYMENT_PORT           — SSH port (usually 22)
#   VITE_STRIPE_PUBLISHABLE_KEY — Stripe publishable key (pk_live_...) baked into frontend bundle
#   STRIPE_SECRET_KEY         — Stripe secret key (sk_live_...)
#   STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret (whsec_...)
#   RESEND_API_KEY            — Resend API key for transactional emails
#   ADMIN_SECRET              — Bearer token for the /admin panel
#
# Note: The repository must be public, OR replace the git clone URL below with
#       a deploy key / PAT for private repo access from the server.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to Docker Hub ───────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      # ── 4. Build image on CI runner (avoids OOM on 1 GB server) and push ─────
      #       VITE_APP_SECRET is baked into the Vite bundle here, not on the server.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            BUILD_ID=${{ github.sha }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          secrets: |
            vite_app_secret=${{ secrets.APP_SECRET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Deploy to production server via SSH ────────────────────────────────
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOYMENT_HOST }}
          username: ${{ secrets.DEPLOYMENT_USER }}
          key: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          port: ${{ secrets.DEPLOYMENT_PORT }}
          script: |
            set -e
            echo "🚀 Starting FinSurf deployment..."

            # ── Ensure project directory exists (first deploy) ───────────────
            if [ ! -d /opt/finsurf ]; then
              echo "📂 Cloning repository for the first time..."
              git clone https://github.com/${{ github.repository }} /opt/finsurf
            fi

            # ── Pull latest config files (.env.nonsecret, deploy/, Caddyfile) ─
            cd /opt/finsurf
            git remote set-url origin https://github.com/${{ github.repository }}
            git fetch origin main
            git reset --hard origin/main

            # ── Export non-secret env vars (includes DOMAIN=finsurf.net) ───────
            set -a
            source /opt/finsurf/.env.nonsecret
            set +a

            # ── Write API keys as plain files — no Docker Swarm required ─────
            #    These files are mounted into the container by docker-compose.prod.yml
            echo "🔑 Writing secret files..."
            mkdir -p secrets
            printf '%s' "${{ secrets.GEMINI_API_KEY }}"     > secrets/gemini_api_key.txt
            printf '%s' "${{ secrets.PERPLEXITY_API_KEY }}" > secrets/perplexity_api_key.txt
            printf '%s' "${{ secrets.GROQ_API_KEY }}"        > secrets/groq_api_key.txt
            printf '%s' "${{ secrets.APP_SECRET }}"         > secrets/app_secret.txt
            printf '%s' "${{ secrets.LANGCHAIN_API_KEY }}"      > secrets/langchain_api_key.txt
            printf '%s' "${{ secrets.STRIPE_SECRET_KEY }}"      > secrets/stripe_secret_key.txt
            printf '%s' "${{ secrets.STRIPE_WEBHOOK_SECRET }}"  > secrets/stripe_webhook_secret.txt
            printf '%s' "${{ secrets.RESEND_API_KEY }}"         > secrets/resend_api_key.txt
            printf '%s' "${{ secrets.ADMIN_SECRET }}"          > secrets/admin_secret.txt
            chmod 644 secrets/*.txt
            echo "✅ Secret files written"

            # ── Pull the pre-built image (built on CI, not here) ─────────────
            echo "📥 Pulling Docker image ${{ env.IMAGE }}:latest ..."
            docker pull ${{ env.IMAGE }}:latest

            # ── Run docker compose using the pulled image (--no-build) ───────
            echo "🐳 Starting containers..."
            cd /opt/finsurf/deploy
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            FINSURF_IMAGE=${{ env.IMAGE }}:latest \
              docker compose -f docker-compose.prod.yml up -d --no-build

            # ── Wait for health check (up to 60 s) ───────────────────────────
            echo "⏳ Waiting for application to become healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml ps | grep -q "healthy"; then
                echo "✅ Application is healthy!"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "❌ Health check timed out after 60 s"
                docker compose -f docker-compose.prod.yml logs finsurf --tail=50
                exit 1
              fi
              sleep 2
            done

            # ── Clean up dangling images / stopped containers ────────────────
            docker system prune -f

            echo "✅ Deployment complete!"
            docker compose -f docker-compose.prod.yml ps

      # ── 6. Surface failure clearly ────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed — check the logs above for details."
          exit 1
