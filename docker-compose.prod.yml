# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Internet-facing deployment with automatic HTTPS
# and Docker Secrets for API keys
#
# Prerequisites:
#   1. A domain pointing to this server's public IP (A/AAAA record).
#   2. Ports 80 and 443 open in your firewall / security group.
#   3. DOMAIN set in your .env (e.g. DOMAIN=finsurf.example.com)
#   4. Docker Swarm initialized: docker swarm init
#   5. Secrets created from files in ./secrets/
#
# Setup (first run):
#   docker swarm init
#   docker secret create gemini_api_key < ./secrets/gemini_api_key.txt
#   docker secret create perplexity_api_key < ./secrets/perplexity_api_key.txt
#   docker secret create openai_api_key < ./secrets/openai_api_key.txt
#   docker secret create anthropic_api_key < ./secrets/anthropic_api_key.txt
#   docker secret create app_secret < ./secrets/app_secret.txt
#   docker compose -f docker-compose.prod.yml build --build-arg VITE_APP_SECRET=$(cat ./secrets/app_secret.txt)
#   docker compose -f docker-compose.prod.yml up -d
#
# Caddy automatically renews the certificate before expiry — no cron needed.
# ─────────────────────────────────────────────────────────────────────────────
services:
  finsurf:
    build:
      context: .
      args:
        VITE_APP_SECRET: ${APP_SECRET:-}
    # Do NOT expose port 3000 to the host — only Caddy can reach it internally.
    expose:
      - "3000"
    env_file: .env.nonsecret
    environment:
      NODE_ENV: production
      TELEMETRY_DB: /app/data/finsurf_telemetry.db
      # Lock CORS to the production domain so other origins are rejected.
      CORS_ORIGIN: https://${DOMAIN}
      # Secrets are mounted as files in /run/secrets/ inside the container
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      APP_SECRET_FILE: /run/secrets/app_secret
    secrets:
      - gemini_api_key
      - perplexity_api_key
      - openai_api_key
      - anthropic_api_key
      - app_secret
    volumes:
      - finsurf_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # Stores TLS certificates (persists across restarts)
      - caddy_config:/config
    depends_on:
      finsurf:
        condition: service_healthy
    restart: unless-stopped

volumes:
  finsurf_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  perplexity_api_key:
    file: ./secrets/perplexity_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  app_secret:
    file: ./secrets/app_secret.txt
